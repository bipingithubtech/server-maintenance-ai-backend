# Security Policies Configuration

deny_list:
  - "rm -rf /"
  - "rm -rf /*"
  - "mkfs"
  - "reboot"
  - "shutdown"
  - "passwd"
  - "chmod 777"
  - "chmod -R 777"
  - "chown -R root:root /"

allow_list:
  - "apt-get"
  - "systemctl"
  - "docker"
  - "ufw"
  - "tail"
  - "journalctl"
  - "cat"
  - "ls"
  - "echo"
  - "curl"
  - "chmod"
  - "chown"
  - "mkdir"
  - "useradd"
  - "userdel"
  - "usermod"
  - "top"
  - "free"
  - "df"
  - "ssh-keygen"
  - "sed"
  - "nginx"
  - "dpkg"
  - "test"
